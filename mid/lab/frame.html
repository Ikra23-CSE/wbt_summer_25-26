<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Donation Form Frame</title>
    <style>
        body {
            font-family: sans-serif;
            font-size: 14px;
        }
        .form-container {
            width: 600px;
            margin: 20px auto;
        }
        .section-title {
            font-weight: bold;
            font-size: 16px;
            margin-top: 20px;
            margin-bottom: 10px;
        }
        .form-group {
            display: flex;
            margin-bottom: 5px;
            align-items: center;
        }
        .form-group label {
            width: 180px;
            text-align: right;
            margin-right: 10px;
            font-weight: bold;
        }
        .form-group input[type="text"], 
        .form-group select {
            width: 300px;
            padding: 2px;
            box-sizing: border-box;
        }
        .radio-group {
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        .sub-label {
            font-size: 11px;
            color: #555;
            display: block;
            text-align: right;
            width: 180px;
            margin-right: 10px;
            margin-top: -5px;
            margin-bottom: 5px;
        }
        .inline-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .short-input {
            width: 60px !important;
        }
        
        
    </style>
</head>
<body>

<div class="form-container">

    <div class="section-title">Donor Information</div>
    
    <div class="form-group">
        <label>First Name<span class="required">*</span></label>
        <input type="text" name="firstname">
    </div>
    <div class="form-group">
        <label>Last Name<span class="required">*</span></label>
        <input type="text" name="lastname">
    </div>
    <div class="form-group">
        <label>Company</label>
        <input type="text" name="company">
    </div>
    <div class="form-group">
        <label>Address 1<span class="required">*</span></label>
        <input type="text" name="address1">
    </div>
    <div class="form-group">
        <label>Address 2</label>
        <input type="text" name="address2">
    </div>
    <div class="form-group">
        <label>City<span class="required">*</span></label>
        <input type="text" name="city">
    </div>
    <div class="form-group">
        <label>State<span class="required">*</span></label>
        <select name="state">
            <option>Select a State</option>
             <option>dinajpur</option>
              <option>rajshahi</option>
        </select>
    </div>
    <div class="form-group">
        <label>Zip Code<span class="required">*</span></label>
        <input type="text" name="zipcode">
    </div>
    <div class="form-group">
        <label>Country<span class="required">*</span></label>
        <select name="country">
            <option>Select a Country</option>
            <option>Bangladesh</option>
            <option>India</option>
            <option>Pakistan</option>
        </select>
    </div>
    <div class="form-group">
        <label>Phone</label>
        <input type="text" name="phone">
    </div>
    <div class="form-group">
        <label>Fax</label>
        <input type="text" name="fax">
    </div>
    <div class="form-group">
        <label>Email<span class="required">*</span></label>
        <input type="text" name="email">
    </div>
    
    <div class="form-group" style="margin-bottom: 0;">
        <label>Donation Amount<span class="required">*</span></label>
        <div class="radio-group">
            <input type="radio" name="amount" value="none" checked> None
            <input type="radio" name="amount" value="50"> $50
            <input type="radio" name="amount" value="75"> $75
            <input type="radio" name="amount" value="100"> $100
            <input type="radio" name="amount" value="250"> $250
            <input type="radio" name="amount" value="other"> Other
        </div>
    </div>
    <div class="sub-label">(Check a button or type in your amount)</div>

    <div class="form-group">
        <label>Other Amount $</label>
        <input type="text" name="other_amount">
    </div>

    <div class="form-group" style="margin-bottom: 0;">
        <label>Recurring Donation</label>
        <div class="radio-group">
            <input type="checkbox" name="recurring"> I am interested in giving on a regular basis.
        </div>
    </div>
    <div class="sub-label">(Check if yes)</div>

    <div class="form-group">
        <label></label>
        <div class="inline-group">
            <span>Monthly Credit Card $</span>
            <input type="text" name="monthly_amount" class="short-input">
            <span>For</span>
            <input type="text" name="months_count" class="short-input">
            <span>Months</span>
        </div>
    </div>

    <div class="section-title">Honorarium and Memorial Donation Information</div>
    
    <div class="form-group">
        <label>I would like to make this donation</label>
        <div class="radio-group" style="display: flex; flex-direction: column; align-items: flex-start;">
            <label style="text-align: left; width: auto; font-weight: normal; margin: 0;">
                <input type="radio" name="donation_type" value="honor"> To Honor
            </label>
            <label style="text-align: left; width: auto; font-weight: normal; margin: 0;">
                <input type="radio" name="donation_type" value="memory"> In Memory of
            </label>
        </div>
    </div>
    
    <div class="form-group">
        <label>Name</label>
        <input type="text" name="honor_name">
    </div>
    <div class="form-group">
        <label>Acknowledge Donation to</label>
        <input type="text" name="acknowledge_to">
    </div>
    <div class="form-group">
        <label>Address</label>
        <input type="text" name="honor_address">
    </div>
    <div class="form-group">
        <label>City</label>
        <input type="text" name="honor_city">
    </div>
    <div class="form-group">
        <label>State</label>
        <select name="honor_state">
            <option>Select a State</option>
        </select>
    </div>
    <div class="form-group">
        <label>Zip</label>
        <input type="text" name="honor_zip">
    </div>

</div>

</body>
</html>
